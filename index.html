<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart SOP Assistant</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">
    <div id="app" class="max-w-5xl mx-auto px-4 py-12">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-bold tracking-tight text-slate-900 mb-2">Smart SOP Assistant</h1>
            <p class="text-slate-500 text-lg">Generate professional Standard Operating Procedures in seconds.</p>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Generator Section -->
            <section class="lg:col-span-2 space-y-6">
                <!-- Editing Mode Banner -->
                <div id="editBanner" class="hidden bg-indigo-50 border border-indigo-200 p-4 rounded-xl flex items-center justify-between animate-fade-in">
                    <div class="flex items-center gap-3">
                        <span class="flex h-3 w-3 relative">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-indigo-500"></span>
                        </span>
                        <span class="font-medium text-indigo-900">Editing Mode: <span id="editingTitleDisplay" class="font-bold"></span></span>
                    </div>
                    <button id="cancelEditBtn" class="text-indigo-600 hover:text-indigo-800 text-sm font-semibold underline">Cancel Edit</button>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                        <span class="w-2 h-6 bg-indigo-600 rounded-full"></span>
                        <span id="generatorTitle">Create New SOP</span>
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label for="taskInput" class="block text-sm font-medium text-slate-700 mb-1">
                                <span id="taskInputLabel">What task do you need an SOP for?</span>
                            </label>
                            <textarea 
                                id="taskInput" 
                                class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all min-h-[80px]"
                                placeholder="e.g. How to onboard a new software engineer"
                            ></textarea>
                        </div>
                        <button 
                            id="generateBtn"
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            <span id="btnText">Generate SOP</span>
                            <div id="loader" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                        </button>
                    </div>
                </div>

                <!-- Result Area -->
                <div id="resultContainer" class="hidden space-y-4">
                    <div class="bg-white p-8 rounded-2xl shadow-md border border-slate-200 relative">
                        <div id="sopResult" class="prose prose-slate max-w-none outline-none focus:ring-2 focus:ring-indigo-100 rounded-lg p-2 transition-all">
                            <!-- Generated content will appear here -->
                        </div>
                        <div class="mt-8 pt-6 border-t border-slate-100 flex justify-end gap-4">
                            <button id="saveBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-6 rounded-lg transition-colors">
                                Save to Dashboard
                            </button>
                            <button id="saveChangesBtn" class="hidden bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-lg transition-colors">
                                Save Changes
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Dashboard Sidebar -->
            <aside class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-full">
                    <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                        <span class="w-2 h-6 bg-slate-800 rounded-full"></span>
                        Saved SOPs
                    </h2>
                    <div id="sopList" class="space-y-3 max-h-[600px] overflow-y-auto pr-2">
                        <!-- Saved items will appear here -->
                        <p id="emptyState" class="text-slate-400 text-center py-8 italic">No SOPs saved yet.</p>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- SOP Modal -->
    <div id="sopModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-3xl max-h-[90vh] rounded-2xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 id="modalTitle" class="text-xl font-bold text-slate-900">SOP Detail</h3>
                <button id="closeModal" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="modalContent" class="p-8 overflow-y-auto prose prose-slate max-w-none">
                <!-- Content -->
            </div>
            <div class="p-4 bg-slate-50 border-t border-slate-100 flex justify-end">
                <button id="deleteSopBtn" class="text-red-600 hover:bg-red-50 font-medium py-2 px-4 rounded-lg transition-colors flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    Delete SOP
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/app.js"></script>
</body>
</html>
